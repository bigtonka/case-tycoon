<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="user-info">
                <img src="avatar.png" class="avatar" alt="Avatar">
                <div class="lvl-badge">Lvl 1</div>
            </div>
            <div class="progress-container">
                <div class="exp-text">До Lvl 2: 0/100 XP</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 20%;"></div></div>
            </div>
            <div class="balance-badge">
                <span id="balance">100</span> <img src="bronze-ticket.png" alt="ticket">
            </div>
        </header>

        <main>
            <h1 class="case-title">BRONZE CASE</h1>
            <div class="case-visual">
                <img src="bronze-case.png" id="main-case" alt="Case">
                <div class="glow"></div>
            </div>

            <div class="actions">
                <button id="open-btn" class="btn-green">ОТКРЫТЬ <span>50 🎫</span></button>
                <button id="ads-btn" class="btn-blue">▶ ПОЛУЧИТЬ +10 🎫</button>
            </div>
        </main>

        <nav>
            <div class="nav-item active"><span class="icon">🏠</span>ДОМ</div>
            <div class="nav-item"><span class="icon">🛒</span>МАГАЗИН</div>
            <div class="nav-item"><span class="icon">👥</span>ДРУЗЬЯ</div>
            <div class="nav-item"><span class="icon">👤</span>ПРОФИЛЬ</div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
