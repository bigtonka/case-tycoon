<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="user-info">
            <div class="avatar-box"><div class="lvl-tag">1</div></div>
            <div class="user-stats">
                <div class="lvl-val">Lvl 1</div>
                <div class="xp-val">0/100 XP</div>
            </div>
        </div>
        <div class="balance-card">100 🎫</div>
    </header>

    <div class="game-content">
        <h1 class="gold-title">BRONZE CASE</h1>
        
        <div class="case-zone">
            <img src="bronze-case.png" class="main-case-img">
        </div>

        <div class="buttons-group">
            <button class="action-btn green-btn">
                ОТКРЫТЬ <span class="price">50 🎫</span>
            </button>
            <button class="action-btn blue-btn">
                ▶ ПОЛУЧИТЬ +10 🎫
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active"><span>🏠</span><p>ДОМ</p></div>
        <div class="nav-btn"><span>🛒</span><p>МАГАЗИН</p></div>
        <div class="nav-btn"><span>👥</span><p>ДРУЗЬЯ</p></div>
        <div class="nav-btn"><span>👤</span><p>ПРОФИЛЬ</p></div>
    </nav>
</div>
</body>
</html>
