<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
        <header class="top-nav">
            <div class="user-block">
                <div class="avatar-ring">
                    <div class="lvl-badge">1</div>
                </div>
                <div class="user-info">
                    <h3>Lvl 1</h3>
                    <p>До Lvl 2: 0/100 XP</p>
                </div>
            </div>
            <div class="balance-block">
                <span class="balance-value">100</span>
                <img src="ticket.png" class="balance-icon large-icon">
            </div>
        </header>

        <main class="main-content">
            <h1 class="case-title-gold">BRONZE CASE</h1>
            
            <div class="case-visual-wrapper">
                <img src="bronze-case.png" id="main-case" class="huge-case">
            </div>
            
            <div class="actions-container shifted-up">
                <button id="open-btn" class="btn-green-premium">
                    ОТКРЫТЬ <span class="price-tag">50 <img src="ticket.png" class="btn-icon large-icon"></span>
                </button>
                <button id="ads-btn" class="btn-blue-premium">
                    ▶ ПОЛУЧИТЬ +10 <img src="ticket.png" class="btn-icon large-icon"></span>
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/home.png">
                <span>🏠 ДОМ</span>
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/shopping-cart.png">
                <span>🛒 МАГАЗИН</span>
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/group.png">
                <span>👥 ДРУЗЬЯ</span>
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/user-male-circle.png">
                <span>👤 ПРОФИЛЬ</span>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
