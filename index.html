<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="user-info">
            <div class="avatar-container">
                <div class="lvl-badge">1</div>
            </div>
            <div class="user-text">
                <div class="lvl-text">Lvl 1</div>
                <div class="xp-text">До Lvl 2: 0/100 XP</div>
            </div>
        </div>
        <div class="balance-badge">
            <span>100 🎫</span>
        </div>
    </header>

    <main class="main-content">
        <h1 class="case-title">BRONZE CASE</h1>
        
        <div class="case-display">
            <img src="bronze-case.png" id="main-case">
        </div>

        <div class="action-area">
            <button class="btn btn-open">
                ОТКРЫТЬ <span class="price-tag">50 🎫</span>
            </button>
            <button class="btn btn-ads">
                ▶ ПОЛУЧИТЬ +10 🎫
            </button>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">ДОМ</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">МАГАЗИН</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-label">ДРУЗЬЯ</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">ПРОФИЛЬ</span>
        </div>
    </nav>
</div>
</body>
</html>
