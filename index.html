<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-nav">
    <div class="user-block">
        <div class="avatar-frame active">
            <span class="add-avatar-text">ДОБАВИТЬ</span>
        </div>
        <div class="lvl-badge active">
            <span id="user-lvl">1</span>
        </div>
        <div class="user-info">
            <h3>Lvl 1</h3>
            <p>До Lvl 2: <span id="xp-current">0</span>/<span id="xp-needed">100</span> XP</p>
        </div>
    </div>
    <div class="balance-block">
        <span class="balance-value">100</span>
        <img src="ticket.png" class="balance-icon" alt="Ticket">
    </div>
</div>

<main>
    <h1 class="case-title">BRONZE CASE</h1>
    <div class="case-visual large"> <img src="bronze-case.png" id="main-case" alt="Case">
    </div>
    <div class="actions shifted-up"> <button id="open-btn" class="btn-green large">
            ОТКРЫТЬ <span class="price-tag">50 <img src="ticket.png" class="btn-icon"></span>
        </button>
        <button id="ads-btn" class="btn-blue large">
            ▶ ПОЛУЧИТЬ +10 <img src="ticket.png" class="btn-icon">
        </button>
    </div>
</main>
    <script src="script.js"></script>
</body>
</html>
